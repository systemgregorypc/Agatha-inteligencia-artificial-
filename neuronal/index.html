<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agatha-IA / Núcleo Central de Investigación</title>
    <style>
        /* [Mantén tus estilos actuales aquí, he añadido un par para el estado] */
        .status-bar { font-size: 12px; color: #3225F5; margin-bottom: 10px; font-style: italic; }
        .loading { color: #160535; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="main-container">
    <h1 class="main-title">Núcleo Central de Inteligencia</h1>
    <div id="statusBar" class="status-bar">Estado: Listo para aprender o investigar...</div>

    <div class="chat-container">
        <div class="chat-box" id="chatBox">
            <div class="agatha-msg"><strong>Agatha:</strong> Hola papá. Estoy conectada a la red y al mercado. ¿Qué investigamos hoy?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ej: precio de btc, ¿qué es la fusión nuclear?, aprende:..." onkeypress="if(event.key === 'Enter') enviarAlNucleo()">
            <button onclick="enviarAlNucleo()">Consultar</button>
        </div>
    </div>
</div>

<script>
    async function enviarAlNucleo() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const statusBar = document.getElementById('statusBar');
        const texto = input.value.trim();
        
        if (texto === "") return;

        // Mostrar usuario
        chatBox.innerHTML += `<div class="user-msg"><strong>Tú:</strong> ${texto}</div>`;
        input.value = "";
        statusBar.innerHTML = `<span class="loading">Agatha está procesando en la red...</span>`;

        try {
            const response = await fetch("https://agatha-core.genesis-ia.workers.dev", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ texto: texto })
            });

            const data = await response.json();
            
            // Agatha responde
            chatBox.innerHTML += `<div class="agatha-msg"><strong>Agatha:</strong> ${data.respuesta}</div>`;
            statusBar.innerHTML = "Estado: Consulta finalizada con éxito.";
            
        } catch (error) {
            chatBox.innerHTML += `<div class="agatha-msg" style="color:red"><strong>Error:</strong> Núcleo fuera de línea.</div>`;
            statusBar.innerHTML = "Estado: Error de conexión.";
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
